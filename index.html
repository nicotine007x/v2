<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthdays</title>
    
    <link rel="stylesheet" href="style_v3.css">

</head>
<body>

<div id="loading-screen">
    <h1>🩵 From'Sanguan 🌼</h1>
    <p>A little surprise for you ✨</p>

    <canvas id="fireworks"></canvas>
    

    <button id="startBtn">
        A Special Gift From Sanguan
    </button>
</div>

<div id="birthdayPopup">
    <span id="typingText"></span>
    <div class="sparkles">
        ✨ ✨ ✨
    </div>

    <div class="butterflies">
        <span>🦋</span>
        <span>🩵</span>
        <span>🦋</span>
        <span>✨</span>
    </div>

</div>

<div id="mainContent">

    <div class="container">

        <div class="nav_link">

            <a href="" class="home_link">Home</a>
            <a href="" class="About_link">About</a>

        </div>

        <div class="dropdown">
            <button id="dropbtn" class="dropbtn" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>

                <div id="myDropdown" class="dropdown-content">
                    <a href="https://www.youtube.com/watch?v=YOUR_VIDEO_ID" target="_blank" class="menu-link" target="_blank">Clip</a>
                    <a href="https://www.instagram.com/_plaslid_?igsh=MXR6M2JvdWhnMndjMQ==" class="menu-link" target="_blank">Instagram</a>
                </div>

        </div>
    </div>

    <h1 class="birthday-title">🎂 Happy Birthday ✨</h1>

    <div class="image-container">

        <button class="nav-btn prev" id="prevBtn">&#10094;</button>

        <div class="photo-slider" id="slider">

            <img src="IMG_0629.JPG" alt="Flower">
            <img src="IMG_0692.JPG" alt="Flower">
            <img src="IMG_0001.jpg" alt="Flower">

        </div>

        <button class="nav-btn next" id="nextBtn">&#10095;</button>

        <div class="dots" id="dots"></div>

    </div>

<div class="music-container">

    <div class="vinyl">
        <img src="IMG_song.png" alt="Album Cover" class="album-cover">
        <div class="vinyl-center"></div>
    </div>

    <h2>Photograph - Ed Sheeran</h2>

    <audio id="birthdaySong" controls autoplay>
        <source src="Photograph - Ed Sheeran.mp3" type="audio/mpeg">
    </audio>

    <div class="floating-notes">
        <span>🎵</span>
        <span>🎶</span>
        <span>✨</span>
    </div>

    <div class="floating-hearts">
        <span>✨</span>
        <span>💗</span>
        <span>💖</span>
    </div>

</div>

    <script>
        function toggleMenu() {
            document.getElementById("myDropdown").classList.toggle("show");
            document.getElementById("dropbtn").classList.toggle("active");
        }

        window.onclick = function(event) {
            if (!event.target.closest('.dropdown')) {
                document.getElementById("myDropdown").classList.remove("show");
                document.getElementById("dropbtn").classList.remove("active");

            }
        }
    </script>

    <script>
        const slider = document.getElementById("slider");
        const images = slider.querySelectorAll("img");
        const dotsContainer = document.getElementById("dots");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");

        nextBtn.addEventListener("click", () => {
            currentIndex++;

            if(currentIndex >= images.length){
                currentIndex = 0;
            }

            updateSlider();
        });

        prevBtn.addEventListener("click", () => {
            currentIndex--;

            if(currentIndex < 0){
                currentIndex = images.length - 1;
            }

            updateSlider();
        });

        let currentIndex = 0;

        images.forEach((_, index) => {
        const dot = document.createElement("div");
        dot.classList.add("dot");

        if(index === 0){
            dot.classList.add("active");
        }

        dot.addEventListener("click", () => {
            currentIndex = index;
            updateSlider();
        });

        dotsContainer.appendChild(dot);
    });

    const dots = document.querySelectorAll(".dot");

    function updateSlider(){
        slider.scrollTo({
            left: currentIndex * slider.clientWidth,
            behavior: "smooth"
        });

        dots.forEach(dot => dot.classList.remove("active"));
        dots[currentIndex].classList.add("active");
    }

    let autoSlide = setInterval(nextSlide, 4500);

    function nextSlide() {
        currentIndex++;

        if (currentIndex >= images.length) {
            currentIndex = 0;
        }

        updateSlider();
    }

    slider.addEventListener("mouseenter", () => {
        clearInterval(autoSlide);
    });

    slider.addEventListener("mouseleave", () => {
        clearInterval(autoSlide);
        autoSlide = setInterval(nextSlide, 4500);
    });

    slider.addEventListener("touchstart", () => {
    clearInterval(autoSlide);
    });

    slider.addEventListener("touchend", () => {
        clearInterval(autoSlide);
        autoSlide = setInterval(nextSlide, 4500);
    });

    </script>

    <script>
const startBtn = document.getElementById("startBtn");
const loadingScreen = document.getElementById("loading-screen");
const audio = document.getElementById("birthdaySong");
const musicCard = document.querySelector(".music-container");

startBtn.addEventListener("click", () => {

    const popup = document.getElementById("birthdayPopup");
    const typingText = document.getElementById("typingText");

    loadingScreen.classList.add("hide");

    setTimeout(() => {

        loadingScreen.style.display = "none";

        popup.classList.add("show");

        launchFireworks();

        const text = "🩵 Happy Birthday To You 🩵";

        let i = 0;

        typingText.textContent = "";

        const typing = setInterval(() => {

            typingText.textContent += text.charAt(i);

            i++;

            if(i >= text.length){
                clearInterval(typing);

                setTimeout(() => {

                    popup.style.opacity = "0";

                    setTimeout(() => {

                        popup.style.display = "none";

                        document.getElementById("mainContent").style.display = "block";

                        audio.currentTime = 70;
                        audio.play();

                        musicCard.classList.add("playing");

                    }, 1000);

                }, 2000);

            }

        }, 80);

    }, 800);

});

function launchFireworks(){

    const canvas = document.getElementById("fireworks");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];

    for(let i = 0; i < 200; i++){

        particles.push({
            x: canvas.width / 2,
            y: canvas.height / 2,

            dx: (Math.random() - 0.5) * 10,
            dy: (Math.random() - 0.5) * 10,

            size: Math.random() * 5 + 2,
            life: 100
        });

    }

    function animate(){

        ctx.clearRect(0,0,canvas.width,canvas.height);

        particles.forEach((p)=>{

            p.x += p.dx;
            p.y += p.dy;

            p.life--;

            ctx.beginPath();
            ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
            ctx.fillStyle = `hsl(${Math.random()*360},100%,60%)`;
            ctx.fill();

        });

        for(let i = particles.length-1; i >=0; i--){

            if(particles[i].life <= 0){
                particles.splice(i,1);
            }

        }

        if(particles.length > 0){
            requestAnimationFrame(animate);
        }

    }

    animate();
}
</script>

    <footer class="footer">
        Made with 💖 by Sanguan
    </footer>
</div>
</body>
</html>
